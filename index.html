<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="2cm.uk，讓分享只剩下 2cm。">
  <title>2cm.uk｜讓分享只剩下 2cm</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --brand-yellow: #ffd21f;
      --brand-yellow-dark: #f4b400;
      --brand-ink: #1f2430;
      --muted-ink: #667085;
      --soft-yellow: #fff8d7;
      --paper: #fffdf6;
      --line: #efe5b7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--brand-ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 210, 31, 0.22), transparent 28rem),
        linear-gradient(180deg, #fffdf2 0%, #ffffff 56%, #fffaf0 100%);
    }

    .site-shell {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      padding: 0.85rem 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 12px 28px rgba(244, 180, 0, 0.18);
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding: clamp(0.75rem, 2vh, 1.5rem) 0 clamp(1rem, 2.5vh, 2rem);
    }

    .headline-row {
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hero-title {
      margin: 0 0 0.35rem;
      font-size: clamp(3.2rem, 8vw, 6.3rem);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-subtitle {
      max-width: 34rem;
      margin: 0 0 0.55rem;
      color: var(--brand-yellow-dark);
      font-size: clamp(1.05rem, 1.8vw, 1.35rem);
      line-height: 1.55;
      font-weight: 700;
    }

    .url-panel {
      max-width: 48rem;
      margin-top: 0.85rem;
      padding: 0.55rem;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(239, 229, 183, 0.85);
      border-radius: 1.2rem;
      box-shadow: 0 24px 70px rgba(98, 80, 14, 0.12);
      backdrop-filter: blur(12px);
    }

    .url-input {
      min-height: 3.7rem;
      border: 0;
      border-radius: 0.9rem;
      padding: 0.9rem 1.1rem;
      font-size: 1rem;
      color: var(--brand-ink);
      background: #fff;
    }

    .url-input:focus {
      box-shadow: 0 0 0 0.18rem rgba(255, 210, 31, 0.28);
    }

    .convert-btn {
      min-height: 4.25rem;
      border: 0;
      border-radius: 0.9rem;
      padding: 0 2.05rem;
      color: #2f2500;
      background: linear-gradient(135deg, var(--brand-yellow) 0%, #ffc107 100%);
      font-size: 1.08rem;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(244, 180, 0, 0.26);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      white-space: nowrap;
    }

    .convert-btn:hover,
    .convert-btn:focus {
      color: #2f2500;
      filter: brightness(1.02);
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(244, 180, 0, 0.34);
    }

    .slogan-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }

    .slogan-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 2.35rem;
      padding: 0.45rem 0.85rem;
      color: #6b5300;
      background: rgba(255, 248, 215, 0.88);
      border: 1px solid rgba(244, 180, 0, 0.18);
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .slogan-dot {
      width: 0.55rem;
      height: 0.55rem;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--brand-yellow);
      box-shadow: 0 0 0 0.32rem rgba(255, 210, 31, 0.2);
    }

    .hero-visual {
      position: relative;
      min-height: clamp(24rem, 56vh, 30rem);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-hero {
      position: relative;
      width: min(72%, 20.5rem);
      height: auto;
      filter: drop-shadow(0 28px 42px rgba(98, 80, 14, 0.18));
      transform: rotate(2deg);
    }

    .footer {
      padding: 0.95rem 0;
      color: #766a44;
      border-top: 1px solid rgba(239, 229, 183, 0.72);
      background: rgba(255, 253, 246, 0.72);
      font-size: 0.95rem;
    }

    .footer-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.45rem 1rem;
    }

    .footer-item {
      white-space: nowrap;
    }

    .footer a {
      color: #6f5400;
      text-decoration: none;
      font-weight: 800;
    }

    .footer a:hover {
      color: #2f2500;
    }

    @media (max-width: 991.98px) {
      .hero {
        padding-top: 1rem;
        text-align: center;
      }

      .hero-subtitle,
      .url-panel {
        margin-left: auto;
        margin-right: auto;
      }

      .headline-row {
        justify-content: center;
      }

      .slogan-list {
        justify-content: center;
      }

      .hero-visual {
        min-height: 21rem;
        margin-top: 1.4rem;
      }

      .logo-hero {
        width: min(52%, 16rem);
      }
    }

    @media (max-width: 575.98px) {
      .navbar {
        padding: 0.85rem 0;
      }

      .hero {
        padding: 0.75rem 0 1.5rem;
      }

      .hero-title {
        margin-top: 0;
      }

      .headline-row {
        display: block;
      }

      .hero-subtitle {
        margin: 0 auto 0.9rem;
      }

      .url-panel {
        padding: 0.45rem;
        border-radius: 1rem;
      }

      .convert-btn {
        width: 100%;
      }

      .hero-visual {
        display: none;
      }

      .footer {
        text-align: center;
      }

      .footer-info {
        gap: 0.35rem;
      }

      .footer-item {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <main class="hero">
      <div class="container">
        <div class="row align-items-center g-5">
          <div class="col-lg-7">
            <div class="headline-row">
              <h1 class="hero-title">2cm.uk</h1>
              <p class="hero-subtitle">讓分享只剩下 2cm</p>
            </div>

            <form class="url-panel" action="#" method="get">
              <div class="row g-2 align-items-center">
                <div class="col-12 col-md">
                  <label class="visually-hidden" for="longUrl">請輸入長網址</label>
                  <input id="longUrl" class="form-control url-input" type="url" placeholder="請輸入完整網址，例如：https://example.com/very-long-link" aria-label="請輸入長網址">
                </div>
                <div class="col-12 col-md-auto">
                  <button class="btn convert-btn" type="submit">轉換短網址</button>
                </div>
              </div>
            </form>

            <div class="slogan-list" aria-label="服務標語">
              <span class="slogan-chip"><span class="slogan-dot" aria-hidden="true"></span>一鍵縮短，簡單到 2cm</span>
              <span class="slogan-chip">2cm.uk，把長網址變短距離</span>
              <span class="slogan-chip">你的品牌短連結，從 2cm 開始</span>
            </div>
          </div>

          <div class="col-lg-5">
            <div class="hero-visual" aria-hidden="true">
              <img class="logo-hero" src="logo.png" alt="">
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-info">
        <div class="footer-item"><a href="https://2cm.uk">https://2cm.uk</a></div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
